    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",

          },

            "@type": "WebSite",
            "@id": "https://nxtrive.com/#website",
            "url": "https://nxtrive.com/",
            "name": "Nxtrive",
            "description": "Offline local RAG desktop app for private document chat.",
            "publisher": { "@id": "https://nxtrive.com/#organization" },
            "inLanguage": "en"
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://nxtrive.com/#app",
            "name": "Nxtrive",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Windows, macOS, Linux",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },
            "description": "Offline local RAG desktop app. Chat with PDFs and documents privately on your machine — no cloud required.",
            "url": "https://nxtrive.com/",
            "downloadUrl": "https://github.com/devzeromax/Nxtrive/releases",
            "softwareVersion": "1.0",
            "license": "https://opensource.org/licenses/MIT",
            "isAccessibleForFree": true,
            "image": "https://nxtrive.com/images/nxtrive-hero-chat.png",
            "publisher": { "@id": "https://nxtrive.com/#organization" }
          },
          {
            "@type": "FAQPage",
            "@id": "https://nxtrive.com/#faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What is local RAG?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Local RAG (retrieval-augmented generation) runs document search and chat on your machine. Nxtrive is a free, open-source offline local RAG desktop app for Windows, macOS, and Linux — turn folders of PDFs, Word documents, Markdown, and source code into a private knowledge base."
                }
              },
              {
                "@type": "Question",
                "name": "Does Nxtrive work completely offline?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. After a one-time Ollama model download, indexing and chat run fully on your device. There is no cloud upload required for day-to-day use."
                }
              },
              {
                "@type": "Question",
                "name": "Which file types does Nxtrive support?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "PDF, Word (.docx), plain text, Markdown, CSV, JSON, HTML, CSS, and source code. Answers include source citations so you can open the exact passage."
                }
              },
              {
                "@type": "Question",
                "name": "Is Nxtrive free?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. Nxtrive is free and open source under the MIT license for Windows, macOS, and Linux."
                }
              },
              {
                "@type": "Question",
                "name": "Do my documents leave my computer?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Embeddings, vectors, and chats stay on localhost. Your files never leave your machine."
                }
              }
            ]
          }
        ]
      }
